  - name: 'Single-Table Modeling From Scratch'
    slug: 'single-table-modeling-from-scratch'
    domain: 'bootstrapping-and-data-modeling'
    description: 'Model one physical table with multiple entities, default internal attributes, key derivation, and index-aware item shapes.'
    type: 'core'
    covers:
      - 'Table indexes'
      - 'Entity entityAttribute (default hidden entity saved as _et)'
      - 'timestamps (created saved as _ct, modified saved as _md)'
      - 'computeKey'
      - 'entityAttributeSavedAs'
    tasks:
      - 'Define a single table with multiple entities'
      - 'Map business fields to partition and sort keys'
      - 'Keep mixed-entity reads identifiable'
      - 'Decide whether to keep or customize default internal attributes'
      - 'Model multi-attribute indexes without unnecessary string concatenation'
    reference_candidates:
      - topic: 'table and entity constructor options'
        reason: 'Many interacting options drive key validity, entity tagging, timestamps, and single-table behavior.'
    failure_modes:
      - mistake: 'Disabling entity tagging in single-table flows'
        mechanism: 'Mixed-entity reads lose cheap entity filtering and fall back to slower formatter probing when entityAttribute is absent.'
        wrong_pattern: |
          const PokemonEntity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            entityAttribute: false,
            schema
          })
        correct_pattern: |
          const PokemonEntity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            entityAttribute: true,
            schema
          })
        source: 'docs/docs/3-entities/1-usage/index.md; docs/docs/3-entities/2-internal-attributes/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
        skills: ['single-table-modeling-from-scratch', 'mixed-entity-querying-and-formatting']
      - mistake: 'Skipping computeKey when schema does not fit table keys'
        mechanism: 'Entity construction throws entity.invalidSchema when key attributes do not directly validate against the table schema and no computeKey is provided.'
        wrong_pattern: |
          const entity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            schema: item({ pokemonId: string().key(), level: number().key() })
          })
        correct_pattern: |
          const entity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            schema: item({ pokemonId: string().key(), level: number().key() }),
            computeKey: ({ pokemonId, level }) => ({ pk: pokemonId, sk: level })
          })
        source: 'src/entity/entity.ts; docs/docs/3-entities/1-usage/index.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Renaming entity names after data exists'
        mechanism: 'The entity name is stored as item metadata in single-table setups, so changing it after writes requires a data migration.'
        wrong_pattern: |
          const PokemonEntity = new Entity({
            name: 'POKEMON_V2',
            table: PokeTable,
            schema
          })
        correct_pattern: |
          const PokemonEntity = new Entity({
            name: 'POKEMON',
            table: PokeTable,
            schema
          })
        source: 'docs/docs/3-entities/1-usage/index.md; docs/docs/3-entities/2-internal-attributes/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Colliding with default internal attribute names'
        mechanism: 'Entity construction injects entity and timestamp attributes by default, so schemas that reuse those logical names or savedAs slots can trigger reserved attribute errors or confusing shape collisions.'
        wrong_pattern: |
          const PokemonEntity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            schema: item({
              entity: string(),
              created: string(),
              modified: string()
            })
          })
        correct_pattern: |
          const PokemonEntity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            entityAttribute: { name: '__entity__', hidden: false },
            timestamps: {
              created: { name: 'createdAt' },
              modified: { name: 'updatedAt' }
            },
            schema: item({
              createdAt: string(),
              updatedAt: string()
            })
          })
        source: 'docs/docs/3-entities/2-internal-attributes/index.md; src/entity/utils/buildEntitySchema/buildEntitySchema.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'String-concatenating multi-attribute index keys unnecessarily'
        mechanism: 'DynamoDB now supports multi-attribute indexes, so agents that default to synthetic PK/SK concatenation can produce avoidable complexity and drift in new table designs.'
        wrong_pattern: |
          const PokeTable = new Table({
            partitionKey: { name: 'pk', type: 'string' },
            sortKey: { name: 'sk', type: 'string' },
            indexes: {
              byTrainerAndYear: {
                type: 'global',
                partitionKey: { name: 'gsi1pk', type: 'string' },
                sortKey: { name: 'gsi1sk', type: 'string' }
              }
            }
          })
        correct_pattern: |
          const PokeTable = new Table({
            partitionKey: { name: 'pk', type: 'string' },
            sortKey: { name: 'sk', type: 'string' },
            indexes: {
              byTrainerAndYear: {
                type: 'global',
                partitionKeys: {
                  trainerId: { type: 'string' },
                  captureYear: { type: 'number' }
                }
              }
            }
