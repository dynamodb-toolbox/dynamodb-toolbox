  - name: 'Defaults, Links, and Derived Attributes'
    slug: 'defaults-links-and-derived-attributes'
    domain: 'shaping-and-mutating-data'
    description: 'Centralize derived values, key defaults, linked attributes, and denormalized index fields in schema definitions.'
    type: 'core'
    covers:
      - 'default'
      - 'putDefault'
      - 'updateDefault'
      - 'keyDefault'
      - 'link'
      - 'putLink'
      - 'updateLink'
      - 'keyLink'
    tasks:
      - 'Compute derived key attributes'
      - 'Fill denormalized fields automatically'
      - 'Keep default and link behavior consistent across puts and updates'
    reference_candidates:
      - topic: 'default and link modes'
        reason: 'The put/update/key variants interact subtly and are easy for agents to flatten into one generic rule.'
    failure_modes:
      - mistake: 'Calling default before key on key attributes'
        mechanism: 'The shorthand default method only resolves to keyDefault when called after key(), so ordering changes semantics.'
        wrong_pattern: |
          const pk = string().default('USER#1').key()
        correct_pattern: |
          const pk = string().key().default('USER#1')
        source: 'docs/docs/4-schemas/2-defaults-and-links/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Forgetting to tag linked key fields with key()'
        mechanism: 'Linked attributes used as derived primary or index keys must still be marked key() so entity key parsing remains correct.'
        wrong_pattern: |
          const schema = item({ a: string().key(), b: string().key() }).and(prev => ({
            pk: string().link<typeof prev>(({ a, b }) => `${a}#${b}`)
          }))
        correct_pattern: |
          const schema = item({ a: string().key(), b: string().key() }).and(prev => ({
            pk: string().key().link<typeof prev>(({ a, b }) => `${a}#${b}`)
          }))
        source: 'docs/docs/4-schemas/2-defaults-and-links/index.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current behavior'
        skills: ['defaults-links-and-derived-attributes', 'single-table-modeling-from-scratch']
      - mistake: 'Assuming updateLink always receives plain values'
        mechanism: 'Update links receive extension syntax such as $add and $get, so arithmetic on the raw value can mis-handle extension objects.'
        wrong_pattern: |
          levelPlusOne: number().updateLink<typeof prev>(({ level }) => level + 1)
        correct_pattern: |
          levelPlusOne: number().updateLink<typeof prev>(({ level }) => {
            if (level === undefined || isExtension(level)) return undefined
            return level + 1
          })
        source: 'docs/docs/4-schemas/2-defaults-and-links/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Not handling deleted attributes inside putLink or updateLink'
        mechanism: 'Derived link logic can break when source attributes disappear or are expressed as removal/update extensions, so links need explicit guard logic rather than assuming every dependency is present.'
        wrong_pattern: |
          slug: string().updateLink<typeof prev>(({ title }) => title.toLowerCase())
        correct_pattern: |
          slug: string().updateLink<typeof prev>(({ title }) => {
            if (title === undefined || isExtension(title)) return undefined
            return title.toLowerCase()
          })
        source: 'maintainer interview; docs/docs/4-schemas/2-defaults-and-links/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'

