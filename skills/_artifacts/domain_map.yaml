      - topic: 'query and scan options'
        reason: 'Index selection, entity tagging, projections, pagination, and filtering interact in several non-obvious ways.'
    failure_modes:
      - mistake: 'Building queries without a valid partition clause'
        mechanism: 'Query parsing validates partition and range shapes and throws when agents project generic DynamoDB query objects onto Toolbox helpers.'
        wrong_pattern: |
          await PokeTable.build(QueryCommand)
            .query({ range: { beginsWith: 'PK#' } })
            .send()
        correct_pattern: |
          await PokeTable.build(QueryCommand)
            .query({ partition: 'TRAINER#ash' })
