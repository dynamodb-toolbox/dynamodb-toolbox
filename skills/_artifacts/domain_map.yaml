        mechanism: 'Docs explicitly warn that scans and batch operations do not reduce read cost, so agents should not pitch them as a performance shortcut.'
        wrong_pattern: |
          await PokeTable.build(ScanCommand)
            .options({ limit: 1000 })
            .send()
        correct_pattern: |
          await PokeTable.build(QueryCommand)
            .query({ partition: 'TRAINER#ash' })
            .send()
