        source: 'src/options/entityAttrFilter.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Assuming unmatched mixed-entity items are silently discarded by default'
        mechanism: 'noEntityMatchBehavior controls whether unmatched items throw or discard, and legacy items can trigger noEntityMatched in query/scan formatting.'
        wrong_pattern: |
          const { Items } = await PokeTable.build(QueryCommand)
            .entities(PokemonEntity, TrainerEntity)
            .send()
        correct_pattern: |
          const { Items } = await PokeTable.build(QueryCommand)
            .entities(PokemonEntity, TrainerEntity)
            .options({ noEntityMatchBehavior: 'DISCARD' })
            .send()
        source: 'docs/versioned_docs/version-v1/6-migration-guide/index.md; src/table/actions/query/queryCommand.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v1 to v2 migration and current behavior'
      - mistake: 'Assuming filters still apply once entities(...) is used'
        mechanism: 'When entities are involved, filter behavior can differ from what raw DynamoDB intuition suggests, and agents can generate code that looks filtered but is effectively ignored or superseded by entity-aware formatting paths.'
        wrong_pattern: |
          await PokeTable.build(QueryCommand)
            .entities(PokemonEntity)
            .options({ filter: { status: 'active' } })
            .send()
        correct_pattern: |
          await PokeTable.build(QueryCommand)
            .entities(PokemonEntity)
            .options({ entityAttrFilter: true })
            .send()
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'

  - name: 'Batch and Transaction Orchestration'
    slug: 'batch-and-transaction-orchestration'
    domain: 'coordinating-multi-item-workflows'
    description: 'Build and execute batch-get, batch-write, transact-get, and transact-write flows with the right execution entry points and constraints.'
    type: 'core'
    covers:
      - 'BatchGetCommand'
      - 'BatchWriteCommand'
      - 'executeBatchGet'
      - 'executeBatchWrite'
      - 'GetTransaction'
      - 'PutTransaction'
      - 'UpdateTransaction'
      - 'DeleteTransaction'
      - 'ConditionCheck'
      - 'executeTransactGet'
      - 'executeTransactWrite'
      - 'clientRequestToken'
    tasks:
      - 'Run multi-item reads'
      - 'Run multi-item writes safely'
      - 'Add idempotency and transactional checks'
    failure_modes:
      - mistake: 'Calling send on batch or transaction builders'
        mechanism: 'Multi-item operations do not expose send and must be executed through the dedicated execute helpers.'
        wrong_pattern: |
          await PokeTable.build(BatchGetCommand).send()
        correct_pattern: |
          const cmd = PokeTable.build(BatchGetCommand)
          await executeBatchGet(cmd)
        source: 'docs/docs/2-tables/2-actions/6-batch-get/index.md; docs/docs/3-entities/4-actions/11-transactions/index.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Placing two write transactions on the same item'
        mechanism: 'Docs explicitly warn that a transaction can only include one operation per item, so separate ConditionCheck plus UpdateTransaction on the same item is invalid.'
        wrong_pattern: |
          await execute(
            PokemonEntity.build(ConditionCheck).key(key).condition(cond),
            PokemonEntity.build(UpdateTransaction).item(item)
          )
        correct_pattern: |
          await execute(
            PokemonEntity.build(UpdateTransaction).item(item).options({ condition: cond })
          )
        source: 'docs/docs/3-entities/4-actions/11-transactions/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Selling batch APIs as a cost optimization'
        mechanism: 'Batch operations improve request orchestration but docs explicitly state they do not reduce DynamoDB read or write cost.'
        wrong_pattern: |
          // Use batch write because it is cheaper than individual writes.
        correct_pattern: |
          // Use batch write to coordinate multiple requests efficiently;
          // cost still follows DynamoDB capacity usage.
        source: 'docs/docs/2-tables/2-actions/6-batch-get/index.md; docs/docs/2-tables/2-actions/7-batch-write/index.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Ignoring unprocessed items or partial batch success'
        mechanism: 'Batch APIs can succeed partially, so generated code that treats a resolved call as full success can silently drop work or data.'
        wrong_pattern: |
          const result = await executeBatchWrite(batchWrite)
          return result
        correct_pattern: |
          const result = await executeBatchWrite(batchWrite)
          if (result.UnprocessedItems && Object.keys(result.UnprocessedItems).length > 0) {
            // retry or surface the partial failure explicitly
          }
          return result
        source: 'maintainer interview; docs/docs/2-tables/2-actions/6-batch-get/index.md; docs/docs/2-tables/2-actions/7-batch-write/index.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Current behavior'

  - name: 'Repositories and Database Entry Points'
    slug: 'repositories-and-database-entry-points'
    domain: 'coordinating-multi-item-workflows'
    description: 'Choose when to use EntityRepository, TableRepository, Registry, and Database instead of low-level command builders.'
    type: 'core'
    covers:
      - 'EntityRepository'
      - 'TableRepository'
      - 'Registry'
      - 'Database'
      - 'MCPToolkit'
      - 'Synchronize'
    tasks:
      - 'Expose a higher-level repository API'
      - 'Group entities and access patterns in a registry'
      - 'Build a database entry point for tooling use cases'
    failure_modes:
      - mistake: 'Using Database in bundle-sensitive paths by default'
        mechanism: 'Docs explicitly warn that Database reduces tree-shaking effectiveness and should be reserved for specific tooling-heavy use cases.'
        wrong_pattern: |
          const db = new Database({ pokedex: PokeRegistry })
          export default db
        correct_pattern: |
          const repo = PokemonEntity.build(EntityRepository)
          export default repo
        source: 'docs/docs/5-databases/1-usage/index.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Using repositories where precise tree-shaking matters'
        mechanism: 'Repositories are convenience entry points that intentionally trade bundle size for ergonomic method access.'
        wrong_pattern: |
          const repo = PokemonEntity.build(EntityRepository)
          await repo.get(key)
        correct_pattern: |
          await PokemonEntity.build(GetItemCommand)
            .key(key)
            .send()
        source: 'docs/docs/1-getting-started/3-usage/index.md; docs/docs/2-tables/2-actions/12-repository/index.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Assuming Database replaces table and entity definitions'
        mechanism: 'Database is an aggregation layer over registries, not an alternative modeling system.'
        wrong_pattern: |
          const db = new Database({ pokedex: {} as any })
        correct_pattern: |
          const registry = PokeTable.build(Registry)
            .registerEntities(PokemonEntity)
          const db = new Database({ pokedex: registry })
        source: 'docs/docs/5-databases/1-usage/index.md'
        priority: 'LOW'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Jumping to Database without asking first'
        mechanism: 'Maintainer guidance is to default lower-level and explicitly ask before using Database, because it is intended for registries, tooling, MCP, or sync-style entry points rather than routine app code.'
        wrong_pattern: |
          const db = new Database({ pokedex: registry })
          export const getPokemon = id => db.tables.pokedex.entities.pokemon.get({ id })
        correct_pattern: |
          const repository = PokemonEntity.build(EntityRepository)
          export const getPokemon = id => repository.get({ id })
        source: 'maintainer interview; docs/docs/5-databases/1-usage/index.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior'

  - name: 'TypeScript Integration and Error Management'
    slug: 'typescript-integration-and-error-management'
    domain: 'maintaining-correctness-over-time'
    description: 'Keep compile-time and runtime correctness aligned by using helper types, schema/entity output types, and DynamoDBToolboxError codes properly.'
    type: 'core'
    covers:
      - 'InputItem'
      - 'ValidItem'
      - 'TransformedItem'
      - 'SavedItem'
      - 'FormattedItem'
      - 'DynamoDBToolboxError'
      - 'error.code'
      - 'error.path'
      - 'error.payload'
    tasks:
      - 'Type application code against entity and schema contracts'
      - 'Inspect parsing and formatting outputs'
      - 'Handle Toolbox errors precisely'
    failure_modes:
      - mistake: 'Using generic Error handling for Toolbox failures'
        mechanism: 'DynamoDBToolboxError exposes typed code, path, and payload fields that are lost when errors are handled as plain Error.'
        wrong_pattern: |
          catch (error) {
            console.error(error.message)
          }
        correct_pattern: |
          catch (error) {
            if (error instanceof DynamoDBToolboxError) {
              console.error(error.code, error.path, error.payload)
            }
          }
        source: 'docs/docs/6-error-management/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Using the wrong instanceof guard shape'
        mechanism: 'A docs bug previously showed a precedence-bug pattern, so agents trained on stale examples may still generate !error instanceof DynamoDBToolboxError instead of the correct parenthesized form.'
        wrong_pattern: |
          if (!error instanceof DynamoDBToolboxError) throw error
        correct_pattern: |
          if (!(error instanceof DynamoDBToolboxError)) throw error
        source: 'maintainer interview; docs/docs/6-error-management/index.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'Docs bug fixed, but stale examples may remain in agent training data'
      - mistake: 'Typing against formatted or saved shapes interchangeably'
        mechanism: 'Internal attributes and renamed attributes make SavedItem and FormattedItem semantically different, especially around entity tags and timestamp visibility.'
        wrong_pattern: |
          type Pokemon = SavedItem<typeof PokemonEntity>
          const name = pokemon.entity
        correct_pattern: |
          type Pokemon = FormattedItem<typeof PokemonEntity>
          const name = pokemon.pokemonId
        source: 'docs/docs/3-entities/2-internal-attributes/index.md'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Current behavior'
      - mistake: 'Manually declaring created and modified instead of using timestamps'
        mechanism: 'AI-generated code often reveals itself by explicitly modeling created and modified even though timestamps are already enabled by default.'
        wrong_pattern: |
          const schema = item({
            pokemonId: string().key(),
            created: string(),
            modified: string()
          })
        correct_pattern: |
          const entity = new Entity({
            name: 'Pokemon',
            table: PokeTable,
            schema: item({ pokemonId: string().key() })
          })
        source: 'maintainer interview; docs/docs/3-entities/2-internal-attributes/index.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Current behavior'

  - name: 'Adopting, Migrating, and Reviewing Toolbox Architecture'
    slug: 'adopting-migrating-and-reviewing-toolbox-architecture'
    domain: 'maintaining-correctness-over-time'
    description: 'Migrate between DynamoDB-Toolbox versions or modeling styles and review whether a codebase is using the library coherently.'
    type: 'lifecycle'
    covers:
      - 'migration guide'
      - 'entityAttribute rework'
      - 'schema freeze removal'
      - 'attr to schema rename'
      - 'Transformers encode/decode rename'
      - 'repository versus command-builder tradeoffs'
    tasks:
      - 'Migrate from v1 patterns to v2'
      - 'Review whether a Toolbox design is coherent'
      - 'Catch legacy APIs that agents still generate'
    failure_modes:
      - mistake: 'Using v1 schema freeze patterns in v2'
        mechanism: 'Schemas no longer require a warm-then-freeze lifecycle, so freeze-era code is legacy risk that agents trained on older examples may still generate.'
        wrong_pattern: |
          const frozen = string().freeze()
          const parsed = frozen.build(Parser).parse(input)
        correct_pattern: |
          const parsed = string().build(Parser).parse(input)
        source: 'docs/versioned_docs/version-v1/6-migration-guide/index.md'
        priority: 'CRITICAL'
        status: 'fixed-but-legacy-risk'
        version_context: 'v1 to v2'
      - mistake: 'Using old attr/schema naming conventions'
        mechanism: 'The migration guide renamed attr to schema or s and renamed the old schema declaration to item, so older samples are misleading in v2.'
        wrong_pattern: |
          import { attr, schema } from 'dynamodb-toolbox/...'
        correct_pattern: |
          import { schema, s } from 'dynamodb-toolbox/schema'
          import { item } from 'dynamodb-toolbox/schema/item'
        source: 'docs/versioned_docs/version-v1/6-migration-guide/index.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'v1 to v2'
      - mistake: 'Using transformer parse/format names after rename'
        mechanism: 'Transformers now use encode and decode, so older parse and format property names are legacy risk.'
        wrong_pattern: |
          const prefix = {
            parse: value => `P#${value}`,
            format: value => value.slice(2)
          }
        correct_pattern: |
          const prefix = {
            encode: value => `P#${value}`,
            decode: value => value.slice(2)
          }
        source: 'docs/versioned_docs/version-v1/6-migration-guide/index.md'
        priority: 'HIGH'
        status: 'fixed-but-legacy-risk'
        version_context: 'v1 to v2'

